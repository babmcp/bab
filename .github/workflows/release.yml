name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-latest
            platform: darwin
            arch: arm64
          - runner: macos-15-intel
            platform: darwin
            arch: x64
          - runner: ubuntu-latest
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64

    runs-on: ${{ matrix.runner }}
    name: build-${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        run: bun build --compile src/cli.ts --outfile bab-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bab-${{ matrix.platform }}-${{ matrix.arch }}
          path: bab-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error

  release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: shasum -a 256 bab-* > checksums.sha256

      - name: Determine pre-release
        id: meta
        run: |
          if echo "$GITHUB_REF_NAME" | grep -qE '(beta|rc|[0-9]{8})'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.meta.outputs.prerelease != 'true' }}
          files: |
            bab-*
            checksums.sha256

  notify-tap:
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - name: Extract version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "checksums.sha256"

      - name: Build JSON payload
        id: payload
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          CHECKSUMS_JSON=$(jq -Rs . < checksums.sha256)
          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --argjson checksums "$CHECKSUMS_JSON" \
            '{version: $version, checksums: $checksums}')
          {
            echo "json<<EOF"
            echo "$PAYLOAD"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger homebrew-tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: babmcp/homebrew-tap
          event-type: release
          client-payload: ${{ steps.payload.outputs.json }}
